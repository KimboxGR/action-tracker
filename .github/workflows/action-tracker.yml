name: Action Tracker

on:
  schedule:
    - cron: '30 10 * * 2'  # Elke dinsdag 12:30 NL tijd
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run tracker
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python tracker.py

      - name: Commit updated products file
        run: |
          git config --local user.email "action@tracker.com"
          git config --local user.name "Action Tracker"
          git add products_seen.json
          git commit -m "Update seen products" || echo "No changes"
          git push
